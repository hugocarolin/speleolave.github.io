<section class="gallery section-dark" id="galerie" aria-labelledby="galerie-title">
  <div class="container">
    <div class="section-heading reveal">
      <p class="section-code">Galerie photos</p>
      <h2 id="galerie-title">Des images du terrain, sans décor ajouté</h2>
    </div>
    <div class="gallery-grid">
      <button class="gallery-item large reveal" type="button" data-lightbox="assets/gallery-2.webp">
        <img src="assets/gallery-2.webp" alt="Galerie tunnel de lave, lumière au fond du tunnel" width="800" height="800" loading="lazy" decoding="async">
      </button>
      <button class="gallery-item reveal" type="button" data-lightbox="assets/gallery-1.webp">
        <img src="assets/gallery-1.webp" alt="Galerie tunnel de lave, roche basaltique" width="800" height="800" loading="lazy" decoding="async">
      </button>
      <button class="gallery-item reveal" type="button" data-lightbox="assets/gallery-3.webp">
        <img src="assets/gallery-3.webp" alt="Galerie tunnel de lave, reliefs sombres" width="800" height="800" loading="lazy" decoding="async">
      </button>
      <button class="gallery-item tall reveal" type="button" data-lightbox="assets/basalte-detail.webp">
        <img src="assets/basalte-detail.webp" alt="Détail du tunnel de lave" width="1920" height="1440" loading="lazy" decoding="async">
      </button>
      <button class="gallery-item reveal" type="button" data-lightbox="assets/gallery-4.webp">
        <img src="assets/gallery-4.webp" alt="Galerie tunnel de lave, paroi volcanique" width="800" height="800" loading="lazy" decoding="async">
      </button>
      <button class="gallery-item reveal" type="button" data-lightbox="assets/gallery-6.webp">
        <img src="assets/gallery-6.webp" alt="Galerie tunnel de lave, coulée figée" width="800" height="800" loading="lazy" decoding="async">
      </button>
      <button class="gallery-item reveal" type="button" data-lightbox="assets/gallery-8.webp">
        <img src="assets/gallery-8.webp" alt="Galerie tunnel de lave, texture minérale" width="800" height="800" loading="lazy" decoding="async">
      </button>
    </div>
  </div>
</section>
