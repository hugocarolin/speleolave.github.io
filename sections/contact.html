<section class="contact section-dark" id="contact" aria-labelledby="contact-title">
  <div class="container contact-grid">
    <div class="contact-copy reveal">
      <p class="section-code">Contact</p>
      <h2 id="contact-title">Préparer une exploration</h2>
      <p>Veuillez remplir le formulaire pour toute demande de renseignements. Vous pouvez aussi appeler directement Teddy Avril.</p>
      <address class="contact-list">
        <a href="tel:+262692375314">
          <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 3.16 10.8 19.79 19.79 0 0 1 .09 2.18 2 2 0 0 1 2.08 0h3a2 2 0 0 1 2 1.72c.12.89.33 1.76.62 2.6a2 2 0 0 1-.45 2.11L5.97 7.7a16 16 0 0 0 6.33 6.33l1.27-1.27a2 2 0 0 1 2.11-.45c.84.29 1.71.5 2.6.62A2 2 0 0 1 20 14.92z"/></svg>
          0692 37 53 14
        </a>
        <a href="mailto:info@speleolave.fr">
          <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m3 5 9 7 9-7M5 19h14a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2Z"/></svg>
          info@speleolave.fr
        </a>
        <a href="https://www.google.com/maps/search/?api=1&query=Sp%C3%A9l%C3%A9o%27Lave%20Tunnels%20de%20lave%20R%C3%A9union" target="_blank" rel="noreferrer">
          <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M12 22s7-6.1 7-13A7 7 0 0 0 5 9c0 6.9 7 13 7 13Z"/><path d="M12 12a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/></svg>
          Point de rendez-vous
        </a>
      </address>
    </div>

    <form class="contact-form reveal" action="mailto:info@speleolave.fr" method="post" enctype="text/plain">
      <div class="form-row">
        <label>
          <span>Nom</span>
          <input type="text" name="nom" autocomplete="family-name" required>
        </label>
        <label>
          <span>Prénom</span>
          <input type="text" name="prenom" autocomplete="given-name">
        </label>
      </div>
      <div class="form-row">
        <label>
          <span>Email</span>
          <input type="email" name="email" autocomplete="email" required>
        </label>
        <label>
          <span>Téléphone</span>
          <input type="tel" name="telephone" autocomplete="tel">
        </label>
      </div>
      <label>
        <span>Message</span>
        <textarea name="message" rows="6" required></textarea>
      </label>
      <button class="button button-primary" type="submit">
        <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M22 2 11 13"/><path d="m22 2-7 20-4-9-9-4 20-7Z"/></svg>
        Envoyer
      </button>
    </form>
  </div>
</section>
